<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল | বেবি প্যালেস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght=400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-xl mx-auto bg-white p-6 rounded-3xl border shadow-sm space-y-4">
        <h2 class="text-xl font-bold text-gray-800 border-b pb-2">🛍️ নতুন প্রোডাক্ট অ্যাড করুন (Advanced Mode)</h2>
        <form id="adv-form" class="space-y-3">
            <input type="text" id="name" placeholder="পণ্যের নাম" class="w-full p-2.5 text-xs border rounded-xl outline-none" required>
            <input type="number" id="price" placeholder="মূল্য (টাকা)" class="w-full p-2.5 text-xs border rounded-xl outline-none" required>
            <textarea id="desc" placeholder="পণ্যের বিবরণ" class="w-full p-2.5 text-xs border rounded-xl outline-none" rows="3" required></textarea>
            
            <select id="category" class="w-full p-2.5 text-xs border rounded-xl bg-white">
                <option value="toy">🧸 বেবি খেলনা</option>
                <option value="care">🧴 বেবি কেয়ার</option>
                <option value="cloth">👕 বেবি পোশাক</option>
                <option value="other">👶 অন্যান্য</option>
            </select>

            <input type="url" id="img" placeholder="প্রধান ছবির লিংক (Main Image URL)" class="w-full p-2.5 text-xs border rounded-xl outline-none" required>
            
            <textarea id="more_imgs" placeholder="অতিরিক্ত ছবিগুলোর লিংক (একটি লিংক বসিয়ে কমা দিবেন, তারপর আরেকটি লিংক বসাবেন)" class="w-full p-2.5 text-xs border rounded-xl outline-none" rows="2"></textarea>
            <input type="url" id="video" placeholder="ইউটিউব ভিডিও লিংক (যেমন: https://www.youtube.com/watch?v=xxxx)" class="w-full p-2.5 text-xs border rounded-xl outline-none">

            <button type="submit" id="sub-btn" class="w-full bg-pink-500 text-white py-2.5 rounded-xl font-bold text-xs">সংরক্ষণ করুন</button>
        </form>
    </div>

    <script>
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbx2e52l7gSS7WiwzjZgxkAPIHMYSlWcTFBvdgj5FzcrcQSs84DY3otAiKVNQr6GqAaj/exec"; // ⚠️ আপনার ইউআরএল দিন

        document.getElementById('adv-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sub-btn');
            btn.disabled = true; btn.innerText = "সংরক্ষণ হচ্ছে...";

            const payload = {
                id: Date.now().toString(),
                name: document.getElementById('name').value,
                price: document.getElementById('price').value,
                desc: document.getElementById('desc').value,
                category: document.getElementById('category').value,
                img: document.getElementById('img').value,
                more_imgs: document.getElementById('more_imgs').value, // নতুন
                video: document.getElementById('video').value // নতুন
            };

            try {
                await fetch(DATABASE_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert("সফলভাবে গুগল শিটে সেভ হয়েছে!");
                document.getElementById('adv-form').reset();
            } catch(err) {
                alert("সমস্যা হয়েছে!");
            } finally {
                btn.disabled = false; btn.innerText = "সংরক্ষণ করুন";
            }
        };
    </script>
</body>
</html>
