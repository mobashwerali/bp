<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন ইনভেন্টরি কন্ট্রোল | বেবি প্যালেস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght=400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div class="min-h-screen flex flex-col">
        <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center border-b border-gray-200">
            <h1 class="text-base sm:text-lg font-bold text-gray-900 flex items-center">
                <i class="fa-solid fa-gauge-high text-pink-500 mr-2"></i> 
                Baby Palace ইনভেন্টরি ড্যাশবোর্ড
            </h1>
            <span class="bg-green-50 text-green-700 border border-green-200 px-3 py-1 rounded-full text-xs font-bold flex items-center">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-1.5 animate-pulse"></span>Google Sheets ড্রাইভ মোড
            </span>
        </nav>

        <div class="max-w-6xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-3 gap-6 flex-1">
            
            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm h-fit">
                <h3 class="font-bold text-gray-900 text-sm mb-4 border-b pb-2 flex items-center justify-between">
                    <span>নতুন প্রোডাক্ট যোগ করুন</span>
                    <i class="fa-solid fa-circle-plus text-gray-400"></i>
                </h3>
                <form id="product-form" class="space-y-3.5">
                    <input type="text" id="p-name" placeholder="প্রোডাক্টের নাম" class="w-full p-2.5 text-xs border rounded-xl bg-gray-50 outline-none focus:border-pink-500 focus:bg-white transition" required>
                    <input type="number" id="p-price" placeholder="মূল্য (টাকা)" class="w-full p-2.5 text-xs border rounded-xl bg-gray-50 outline-none focus:border-pink-500 focus:bg-white transition" required>
                    <textarea id="p-desc" placeholder="পণ্যের সংক্ষিপ্ত বিবরণ" class="w-full p-2.5 text-xs border rounded-xl bg-gray-50 outline-none focus:border-pink-500 focus:bg-white transition" rows="2" required></textarea>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">ক্যাটাগরি নির্ধারণ করুন:</label>
                        <select id="p-category" class="w-full p-2.5 text-xs border rounded-xl bg-gray-50 outline-none focus:border-pink-500 focus:bg-white">
                            <option value="toy">🧸 বেবি খেলনা (Toys)</option>
                            <option value="care">🧴 বেবি কেয়ার (Care)</option>
                            <option value="cloth">👕 বেবি পোশাক (Clothing)</option>
                            <option value="other">👶 অন্যান্য (Others)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">ছবির অনলাইন ইউআরএল (URL):</label>
                        <input type="url" id="p-link" placeholder="https://example.com/image.jpg" class="w-full p-2.5 text-xs border rounded-xl bg-gray-50 outline-none focus:border-pink-500 focus:bg-white transition" required>
                    </div>

                    <button type="submit" id="add-btn" class="w-full bg-pink-500 text-white py-2.5 rounded-xl font-bold text-xs hover:bg-pink-600 transition shadow-md">সংরক্ষণ করুন</button>
                </form>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-gray-200 shadow-sm lg:col-span-2 flex flex-col">
                <h3 class="font-bold text-gray-900 text-sm mb-4 border-b pb-2 flex items-center justify-between">
                    <span>লাইভ ইনভেন্টরি তালিকা</span>
                    <button onclick="loadLiveInventory()" class="text-xs text-pink-500 hover:text-pink-600 font-semibold"><i class="fa-solid fa-rotate mr-1"></i> রিফ্রেশ</button>
                </h3>
                <div id="admin-inventory-list" class="space-y-2 max-h-[70vh] overflow-y-auto pr-1">
                    <p class="text-center text-gray-400 py-12 text-xs">ডাটা লোড হচ্ছে...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ এখানে আপনার কপি করা Google Apps Script Web App URLটি বসান
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbz1WCnMkc-sFBE94h1leLoPosT0ttUjGRoJobjQ9K5y4AMtBxcB6EDWb9Z9ZMj_Nu2m/exec"; 

        window.onload = () => {
            loadLiveInventory();
        }

        async function loadLiveInventory() {
            const container = document.getElementById('admin-inventory-list');
            try {
                const res = await fetch(DATABASE_URL);
                const items = await res.json();

                if(!items || items.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 text-gray-400">
                            <i class="fa-regular fa-folder-closed text-2xl mb-1.5 block"></i>
                            <p class="text-xs">কোনো পণ্য খুঁজে পাওয়া যায়নি। নতুন পণ্য যোগ করুন।</p>
                        </div>`;
                    return;
                }

                container.innerHTML = "";
                items.reverse().forEach(p => {
                    container.insertAdjacentHTML('beforeend', `
                        <div class="bg-gray-50 p-2.5 rounded-xl flex justify-between items-center text-xs border border-gray-200/60 hover:bg-gray-100/50 transition">
                            <div class="flex items-center space-x-3 truncate">
                                <img src="${p.img}" class="w-10 h-10 object-cover rounded-lg bg-gray-200 border" onerror="this.src='https://placehold.co/50';">
                                <div class="truncate">
                                    <p class="font-bold text-gray-800 truncate">${p.name}</p>
                                    <p class="text-pink-500 font-bold mt-0.5">৳ ${p.price}</p>
                                </div>
                            </div>
                            <button onclick="deleteLiveItem('${p.id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100/70 p-2 rounded-xl transition ml-4 flex-shrink-0">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    `);
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 text-center text-xs font-semibold py-6">সংযোগ ত্রুটি: ${err.message}</p>`;
            }
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('add-btn');
            btn.disabled = true;
            btn.innerText = "সংরক্ষণ হচ্ছে...";

            const newProduct = {
                id: Date.now().toString(),
                name: document.getElementById('p-name').value,
                price: parseFloat(document.getElementById('p-price').value),
                desc: document.getElementById('p-desc').value,
                category: document.getElementById('p-category').value,
                img: document.getElementById('p-link').value
            };

            try {
                await fetch(DATABASE_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newProduct)
                });

                document.getElementById('product-form').reset();
                document.getElementById('admin-inventory-list').innerHTML = '<p class="text-center text-gray-400 py-12 text-xs">তালিকা আপডেট করা হচ্ছে...</p>';
                setTimeout(loadLiveInventory, 2000); 
            } catch(error) {
                alert("যোগ করা যায়নি: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "সংরক্ষণ করুন";
            }
        });

        async function deleteLiveItem(id) {
            if(!confirm("আপনি কি নিশ্চিতভাবে এই প্রোডাক্টটি ডিলিট করতে চান?")) return;
            try {
                document.getElementById('admin-inventory-list').innerHTML = '<p class="text-center text-gray-400 py-12 text-xs">মুছে ফেলা হচ্ছে...</p>';
                await fetch(DATABASE_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: "delete", id: id })
                });
                setTimeout(loadLiveInventory, 2000);
            } catch(error) {
                alert("ডিলিট করা যায়নি: " + error.message);
                loadLiveInventory();
            }
        }
    </script>
</body>
</html>
