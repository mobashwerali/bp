<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোডাক্ট ডিটেইলস | Baby Palace</title>
    
    <!-- Dynamic SEO Optimization Meta Tags placeholders -->
    <meta name="description" content="বেবি প্যালেস থেকে প্রিমিয়াম কোয়ালিটির পণ্যটি সরাসরি হোয়াটসঅ্যাপে দ্রুত অর্ডার করুন।">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght=400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Hind Siliguri', sans-serif; }</style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- নেভিগেশন বার -->
    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-4xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <div class="h-9 w-9 rounded-full bg-pink-500 flex items-center justify-center text-white font-bold text-base shadow-md">BP</div>
                <span class="text-xl font-bold text-gray-900 tracking-tight">Baby<span class="text-pink-500">Palace</span></span>
            </a>
            <a href="index.html" class="text-xs font-semibold bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-full transition">
                <i class="fa-solid fa-house text-pink-500 mr-1"></i> সব প্রোডাক্ট দেখুন
            </a>
        </div>
    </nav>

    <!-- প্রোডাক্ট ভিউ এরিয়া -->
    <main class="max-w-4xl mx-auto px-4 py-8 sm:py-12">
        <div id="loading-state" class="text-center py-20 flex flex-col items-center justify-center space-y-3">
            <div class="w-9 h-9 border-4 border-pink-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs font-medium text-gray-500">প্রোডাক্টের বিবরণ লোড হচ্ছে...</p>
        </div>

        <div id="product-container" class="hidden bg-white rounded-3xl border border-gray-100 shadow-sm p-4 sm:p-8 grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            <!-- বাম পাশ: ইমেজ -->
            <div class="w-full aspect-square bg-gray-50 rounded-2xl overflow-hidden border border-gray-100">
                <img id="p-img" src="" alt="" class="w-full h-full object-cover">
            </div>
            
            <!-- ডান পাশ: ডিটেইলস -->
            <div class="flex flex-col justify-between h-full space-y-6">
                <div>
                    <span id="p-badge" class="bg-pink-50 text-pink-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider inline-block mb-3">বেবি শপ</span>
                    <h1 id="p-name" class="text-xl sm:text-2xl font-bold text-gray-900 leading-snug"></h1>
                    <div class="mt-4 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                        <p class="text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-1">পণ্যের বিবরণ:</p>
                        <p id="p-desc" class="text-gray-600 text-sm sm:text-base leading-relaxed whitespace-pre-line"></p>
                    </div>
                </div>

                <div class="pt-4 border-t border-gray-100">
                    <div class="flex items-baseline space-x-2">
                        <span class="text-xs font-bold text-gray-400">মূল্য:</span>
                        <p id="p-price" class="text-2xl sm:text-3xl font-extrabold text-pink-500"></p>
                    </div>
                    
                    <button id="p-whatsapp-btn" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white py-3 px-4 rounded-xl font-bold text-sm sm:text-base transition flex items-center justify-center space-x-2 shadow-lg shadow-green-100">
                        <i class="fa-brands fa-whatsapp text-lg sm:text-xl"></i>
                        <span>হোয়াটসঅ্যাপে অর্ডার নিশ্চিত করুন</span>
                    </button>
                    <p class="text-center text-[11px] text-gray-400 mt-2.5"><i class="fa-solid fa-shield-heart mr-1 text-pink-400"></i> ১০০% নিরাপদ শপিং এবং ক্যাশ অন ডেলিভারি সুবিধা</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const WHATSAPP_NUMBER = "+8801763128639"; 
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbxPyO_u3bs67w_m_fAdQXJNej5yC0RTdjsXYXh9ZViGlzHH_TNZURtBH3o463APl3w_/exec";

        const categoryNames = {
            'toy': '🧸 বেবি খেলনা',
            'care': '🧴 বেবি কেয়ার',
            'cloth': '👕 বেবি পোশাক',
            'other': '👶 অন্যান্য'
        };

        // URL থেকে প্রোডাক্টের ID এবং Name রিড করার মেকানিজম
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        async function loadProductDetails() {
            const productId = getQueryParam('id');
            if(!productId) {
                showError("কোনো প্রোডাক্ট আইডি পাওয়া যায়নি!");
                return;
            }

            try {
                const res = await fetch(DATABASE_URL);
                const products = await res.json();
                
                // আইডি অনুযায়ী নির্দিষ্ট প্রোডাক্টটি খুঁজে বের করা
                const product = products.find(p => String(p.id) === String(productId));

                if(!product) {
                    showError("দুঃখিত, প্রোডাক্টটি খুঁজে পাওয়া যায়নি বা স্টক শেষ হয়ে গেছে!");
                    return;
                }

                // ডাইনামিক ডাটা সেট করা
                document.title = `${product.name} | Baby Palace`;
                document.getElementById('p-img').src = product.img;
                document.getElementById('p-img').alt = product.name;
                document.getElementById('p-name').innerText = product.name;
                document.getElementById('p-desc').innerText = product.desc || 'কোনো বিবরণ দেওয়া নেই।';
                document.getElementById('p-price').innerText = `৳ ${product.price}`;
                document.getElementById('p-badge').innerText = categoryNames[product.category] || 'বেবি প্রোডাক্ট';

                // হোয়াটসঅ্যাপ বাটনের অ্যাকশন কনফিগার করা
                document.getElementById('p-whatsapp-btn').onclick = () => {
                    const currentUrl = window.location.href;
                    const message = `আসসালামু আলাইকুম! আমি বেবি প্যালেস থেকে এই প্রোডাক্টটি অর্ডার করতে চাই:\n\n📦 *প্রোডাক্টের নাম:* ${product.name}\n💰 *মূল্য:* ৳ ${product.price}\n🔗 *প্রোডাক্ট লিঙ্ক:* ${currentUrl}\n\nদয়া করে অর্ডারটি কনফার্ম করুন। ধন্যবাদ!`;
                    window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
                };

                // ইন্টারফেস শো করা
                document.getElementById('loading-state').classList.add('hidden');
                document.getElementById('product-container').classList.remove('hidden');

            } catch (err) {
                showError("সার্ভার থেকে তথ্য লোড করা যায়নি।");
            }
        }

        function showError(msg) {
            document.getElementById('loading-state').innerHTML = `
                <div class="text-center py-12">
                    <i class="fa-solid fa-circle-exclamation text-red-400 text-3xl mb-3"></i>
                    <p class='text-sm font-semibold text-gray-700'>${msg}</p>
                    <a href="index.html" class="mt-4 inline-block text-xs font-bold text-pink-500 hover:underline">হোমপেজে ফিরে যান</a>
                </div>`;
        }

        loadProductDetails();
    </script>
</body>
</html>
