<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বেবি প্যালেস | প্রিমিয়াম বেবি শপ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght=400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .product-card { background: white; border-radius: 1.25rem; padding: 0.85rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.3s ease; }
        @media(min-width: 1024px) { .product-card:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.08); transform: translateY(-4px); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* স্লাইডার অ্যানিমেশন ও স্টাইল */
        .slider-container { display: flex; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; height: 100%; }
        .slide { flex: 0 0 100%; width: 100%; height: 100%; }
        .dot.active { background-color: #ec4899; width: 1.25rem; }
        .thumb-btn.active { border-color: #ec4899; opacity: 1; transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="h-10 w-10 rounded-full bg-pink-500 flex items-center justify-center text-white font-bold text-lg shadow-md">BP</div>
                <h1 class="text-xl sm:text-2xl font-bold text-gray-900 tracking-tight">Baby<span class="text-pink-500">Palace</span></h1>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-b from-pink-50/50 to-white pt-12 pb-8 text-center px-4">
        <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-800">আপনার <span class="text-pink-500">ছোট্ট সোনামণি-র</span> সব প্রয়োজন</h2>
    </header>

    <section class="max-w-6xl mx-auto px-4 mb-8"><div class="flex space-x-2 overflow-x-auto no-scrollbar py-2" id="category-buttons"></div></section>

    <main class="max-w-6xl mx-auto px-4 pb-20">
        <h3 class="text-lg font-bold text-gray-900 mb-6 flex items-center"><span class="w-2 h-5 bg-pink-500 mr-2.5 rounded-full"></span> <span id="current-category-title">সব প্রোডাক্ট</span></h3>
        <div id="product-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-6">
            <div class="col-span-full text-center text-gray-400 py-16">লোড হচ্ছে...</div>
        </div>
    </main>

    <div id="product-modal" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl relative transform scale-95 transition-transform duration-300 max-h-[90vh] flex flex-col">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 bg-black/40 hover:bg-black/60 text-white w-8 h-8 rounded-full flex items-center justify-center z-10 transition">
                <i class="fa-solid fa-xmark"></i>
            </button>
            
            <div class="overflow-y-auto p-5 sm:p-6 space-y-4">
                
                <div class="w-full aspect-square bg-gray-50 rounded-2xl overflow-hidden border relative group">
                    <div id="slider-wrapper" class="slider-container" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)" ontouchend="handleTouchEnd()">
                        </div>
                    
                    <button onclick="prevSlide()" id="prev-btn" class="absolute left-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-gray-800 w-8 h-8 rounded-full flex items-center justify-center shadow transition hidden">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                    <button onclick="nextSlide()" id="next-btn" class="absolute right-3 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white text-gray-800 w-8 h-8 rounded-full flex items-center justify-center shadow transition hidden">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                    
                    <div id="slider-dots" class="absolute bottom-3 left-1/2 -translate-x-1/2 flex space-x-1.5 z-10"></div>
                </div>

                <div id="modal-thumbs" class="flex space-x-2 overflow-x-auto py-1 no-scrollbar justify-center"></div>

                <div>
                    <h3 id="modal-name" class="text-lg sm:text-xl font-bold text-gray-900 leading-snug"></h3>
                    <p id="modal-price" class="text-xl font-extrabold text-pink-500 mt-1"></p>
                </div>

                <div id="modal-video-container" class="hidden bg-gray-50 p-3 rounded-2xl border">
                    <p class="text-[11px] font-bold text-gray-400 uppercase mb-2"><i class="fa-solid fa-video text-pink-500"></i> প্রোডাক্টের লাইভ ভিডিও:</p>
                    <div class="w-full aspect-video rounded-xl overflow-hidden shadow-sm" id="video-frame-wrapper"></div>
                </div>

                <div class="bg-gray-50 p-4 rounded-xl border">
                    <p class="text-[11px] font-bold text-gray-400 uppercase mb-1">পণ্যের বিবরণ:</p>
                    <p id="modal-desc" class="text-gray-600 text-sm sm:text-base leading-relaxed whitespace-pre-line"></p>
                </div>
            </div>
            
            <div class="p-4 border-t bg-gray-50">
                <button id="modal-order-btn" class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold text-sm flex items-center justify-center space-x-2 shadow-lg shadow-green-100">
                    <i class="fa-brands fa-whatsapp text-lg"></i> <span>হোয়াটসঅ্যাপে অর্ডার করুন</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const WHATSAPP_NUMBER = "+8801763128639"; 
        const DATABASE_URL = "https://script.google.com/macros/s/AKfycbx2e52l7gSS7WiwzjZgxkAPIHMYSlWcTFBvdgj5FzcrcQSs84DY3otAiKVNQr6GqAaj/exec"; // ⚠️ এখানে আপনার ইউআরএল দিন

        let selectedCategory = 'all', products = [];
        let currentSlideIndex = 0, totalSlides = 0;
        let touchStartX = 0, touchEndX = 0;

        async function fetchProducts() {
            try {
                const res = await fetch(DATABASE_URL);
                products = await res.json();
                renderStorefront();
            } catch (err) {
                document.getElementById('product-list').innerHTML = "<p class='col-span-full text-center text-red-500 py-12'>সংযোগ সমস্যা!</p>";
            }
        }

        function renderCategoryButtons() {
            const container = document.getElementById('category-buttons');
            container.innerHTML = "";
            categories.forEach(cat => {
                const isActive = selectedCategory === cat.id;
                container.insertAdjacentHTML('beforeend', `<button onclick="filterCategory('${cat.id}')" class="px-5 py-2.5 text-xs sm:text-sm rounded-full whitespace-nowrap transition ${isActive ? 'bg-pink-500 text-white font-bold' : 'bg-white text-gray-600 border'}">${cat.name}</button>`);
            });
        }

        function filterCategory(catId) {
            selectedCategory = catId;
            document.getElementById('current-category-title').innerText = categories.find(c => c.id === catId).name;
            renderCategoryButtons();
            renderStorefront();
        }

        function renderStorefront() {
            const productList = document.getElementById('product-list');
            productList.innerHTML = "";
            const filtered = selectedCategory === 'all' ? products : products.filter(p => p.category === selectedCategory);

            if (filtered.length === 0) {
                productList.innerHTML = "<p class='col-span-full text-center py-12 text-gray-400'>কোনো প্রোডাক্ট নেই।</p>";
                return;
            }

            [...filtered].reverse().forEach(p => {
                const globalIndex = products.findIndex(item => item.id === p.id);
                productList.insertAdjacentHTML('beforeend', `
                    <div class="product-card flex flex-col justify-between border border-gray-100">
                        <div onclick="openModal(${globalIndex})" class="cursor-pointer">
                            <div class="w-full h-36 sm:h-48 bg-gray-100 rounded-xl mb-3 overflow-hidden border">
                                <img src="${p.img}" class="w-full h-full object-cover">
                            </div>
                            <h4 class="font-bold text-gray-800 text-sm line-clamp-1 hover:text-pink-500 transition">${p.name}</h4>
                            <p class="text-gray-400 text-[11px] mt-1 line-clamp-2">${p.desc || ''}</p>
                            <span class="text-pink-500 text-[11px] font-bold mt-1 block">See More...</span>
                        </div>
                        <div class="mt-3">
                            <p class="text-base font-extrabold text-pink-500">৳ ${p.price}</p>
                            <button onclick="orderViaWhatsApp('${p.name}', ${p.price})" class="w-full mt-2 bg-green-600 text-white py-2 rounded-xl text-xs font-bold flex items-center justify-center space-x-1 hover:bg-green-700 transition">
                                <i class="fa-brands fa-whatsapp"></i> <span>অর্ডার করুন</span>
                            </button>
                        </div>
                    </div>
                `);
            });
        }

        function getYouTubeEmbedUrl(url) {
            if (!url) return null;
            let videoId = null;
            if (url.includes('youtube.com/watch?v=')) {
                videoId = url.split('v=')[1].split('&')[0];
            } else if (url.includes('youtu.be/')) {
                videoId = url.split('youtu.be/')[1].split('?')[0];
            } else if (url.includes('youtube.com/embed/')) {
                return url;
            }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        }

        // 🌟 মোডাল ওপেন এবং অ্যাডভান্সড স্লাইডশো সেটআপ
        function openModal(index) {
            const p = products[index];
            if(!p) return;

            currentSlideIndex = 0;
            const sliderWrapper = document.getElementById('slider-wrapper');
            const thumbsContainer = document.getElementById('modal-thumbs');
            const dotsContainer = document.getElementById('slider-dots');
            
            sliderWrapper.innerHTML = "";
            thumbsContainer.innerHTML = "";
            dotsContainer.innerHTML = "";

            // ছবি প্রসেসিং
            let allImages = [p.img];
            if(p.more_imgs) {
                allImages = allImages.concat(p.more_imgs.split(',').map(link => link.trim()).filter(l => l !== ""));
            }
            totalSlides = allImages.length;

            // স্লাইডার উইন্ডো ও ইন্ডিকেটর তৈরি
            allImages.forEach((imgUrl, idx) => {
                // স্লাইড ইমেজ যোগ
                sliderWrapper.insertAdjacentHTML('beforeend', `
                    <div class="slide flex-shrink-0 w-100 h-100">
                        <img src="${imgUrl}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400?text=No+Image';">
                    </div>
                `);
                
                // থাম্বনেইল বাটন যোগ
                thumbsContainer.insertAdjacentHTML('beforeend', `
                    <button onclick="goToSlide(${idx})" class="thumb-btn flex-shrink-0 w-12 h-12 rounded-lg border-2 border-gray-200 overflow-hidden opacity-60 transition duration-200 ${idx === 0 ? 'active' : ''}">
                        <img src="${imgUrl}" class="w-full h-full object-cover">
                    </button>
                `);

                // ডট বাটন যোগ
                dotsContainer.insertAdjacentHTML('beforeend', `
                    <span onclick="goToSlide(${idx})" class="dot w-2 h-2 rounded-full bg-gray-300 transition-all duration-300 cursor-pointer ${idx === 0 ? 'active' : ''}"></span>
                `);
            });

            // স্লাইডার নেভিগেশন এরো বাটন অন/অফ
            if (totalSlides > 1) {
                document.getElementById('prev-btn').classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                thumbsContainer.classList.remove('hidden');
            } else {
                document.getElementById('prev-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.add('hidden');
                thumbsContainer.classList.add('hidden'); // একটি ছবি থাকলে গ্যালারি দেখানোর প্রয়োজন নেই
            }

            // টেক্সট ডেটা অ্যাসাইন
            document.getElementById('modal-name').innerText = p.name;
            document.getElementById('modal-price').innerText = `৳ ${p.price}`;
            document.getElementById('modal-desc').innerText = p.desc || 'কোনো বিবরণ নেই।';

            // ভিডিও কন্টেইনার সেটআপ
            const videoContainer = document.getElementById('modal-video-container');
            const videoWrapper = document.getElementById('video-frame-wrapper');
            const embedUrl = getYouTubeEmbedUrl(p.video);

            if(embedUrl) {
                videoWrapper.innerHTML = `<iframe class="w-full h-full" src="${embedUrl}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
                videoContainer.classList.remove('hidden');
            } else {
                videoWrapper.innerHTML = "";
                videoContainer.classList.add('hidden');
            }

            document.getElementById('modal-order-btn').onclick = () => orderViaWhatsApp(p.name, p.price);

            const modal = document.getElementById('product-modal');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); modal.querySelector('div').classList.remove('scale-95'); }, 10);
            updateSliderPosition();
        }

        // 🌟 স্লাইডার কন্ট্রোল লজিক
        function updateSliderPosition() {
            const wrapper = document.getElementById('slider-wrapper');
            wrapper.style.transform = `translateX(-${currentSlideIndex * 100}%)`;

            // একটিভ থাম্বনেইল আপডেট
            const thumbs = document.querySelectorAll('.thumb-btn');
            thumbs.forEach((t, i) => {
                if(i === currentSlideIndex) t.classList.add('active');
                else t.classList.remove('active');
            });

            // একটিভ ডট আপডেট
            const dots = document.querySelectorAll('.dot');
            dots.forEach((d, i) => {
                if(i === currentSlideIndex) d.classList.add('active');
                else d.classList.remove('active');
            });
        }

        function nextSlide() {
            if (currentSlideIndex < totalSlides - 1) currentSlideIndex++;
            else currentSlideIndex = 0; // স্লাইড শেষ হলে আবার প্রথমে চলে যাবে
            updateSliderPosition();
        }

        function prevSlide() {
            if (currentSlideIndex > 0) currentSlideIndex--;
            else currentSlideIndex = totalSlides - 1; // প্রথমে থাকলে শেষে চলে যাবে
            updateSliderPosition();
        }

        function goToSlide(index) {
            currentSlideIndex = index;
            updateSliderPosition();
        }

        // 📱 মোবাইল টাচ/সোয়াইপ (Swipe) সাপোর্ট লজিক
        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
        }

        function handleTouchMove(e) {
            touchEndX = e.touches[0].clientX;
        }

        function handleTouchEnd() {
            const swipeDistance = touchStartX - touchEndX;
            if (swipeDistance > 50) {
                nextSlide(); // বামে সোয়াইপ করলে পরের স্লাইড
            } else if (swipeDistance < -50) {
                prevSlide(); // ডানে সোয়াইপ করলে আগের স্লাইড
            }
        }

        function closeModal() {
            const modal = document.getElementById('product-modal');
            document.getElementById('video-frame-wrapper').innerHTML = ""; 
            modal.classList.add('opacity-0'); modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function orderViaWhatsApp(name, price) {
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(`আসসালামু আলাইকুম! আমি বেবি প্যালেস থেকে এই প্রোডাক্টটি অর্ডার করতে চাই:\n\n📦 *নাম:* ${name}\n💰 *মূল্য:* ৳ ${price}`)}`, '_blank');
        }

        const categories = [{ id: 'all', name: 'সব প্রোডাক্ট' }, { id: 'toy', name: 'বেবি খেলনা' }, { id: 'care', name: 'বেবি কেয়ার' }, { id: 'cloth', name: 'বেবি পোশাক' }, { id: 'other', name: 'অন্যান্য' }];
        renderCategoryButtons(); fetchProducts();
    </script>
</body>
</html>
